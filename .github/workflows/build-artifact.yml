name: build artifact

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-artifact.yml"
      - "package.json"
      - "recipes/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/build-artifact.yml"
      - "package.json"
      - "recipes/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      artifact_id:
        description: Artifact recipe id under recipes/
        required: true
        type: string
      release_tag:
        description: Release tag to publish
        required: true
        type: string
      publish:
        description: Publish GitHub Release assets
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate recipes
        run: node scripts/validate-recipes.mjs

  build:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-go@v5
        if: inputs.artifact_id == 'go-exec-capture-helper-riscv64'
        with:
          go-version: "1.26.1"

      - name: Install archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-riscv64-linux-gnu xz-utils zstd

      - name: Build artifact
        run: |
          node scripts/build-artifact.mjs \
            --artifact-id "${{ inputs.artifact_id }}" \
            --out "dist/${{ inputs.artifact_id }}"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_id }}
          path: dist/${{ inputs.artifact_id }}/*

      - name: Publish release
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.release_tag }}" \
            dist/${{ inputs.artifact_id }}/* \
            --title "${{ inputs.release_tag }}" \
            --generate-notes
